{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card border-0 shadow-lg rounded-4 p-4" style="max-width: 500px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-1">Teacher / Staff Login</h2>
            <p class="text-muted mb-0">Use your credentials and teacher ID</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control form-control-lg rounded-3" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg rounded-3" placeholder="Enter password" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Teacher ID</label>
                <input type="text" name="teacher_id" class="form-control form-control-lg rounded-3" placeholder="Enter teacher ID" required>
            </div>

            <button type="submit" class="btn btn-secondary w-100 rounded-pill py-2 fw-semibold">
                Login as Teacher
            </button>
        </form>
    </div>
</div>

{% endblock %}
