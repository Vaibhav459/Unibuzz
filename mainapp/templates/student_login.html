{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card border-0 shadow-lg rounded-4 p-4" style="max-width: 500px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-1">Student Login</h2>
            <p class="text-muted mb-0">Login to continue to your student panel</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control form-control-lg rounded-3" placeholder="Enter username" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg rounded-3" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 fw-semibold">
                Login as Student
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="mb-2 text-muted">New here?</p>
            <a href="{% url 'register' %}" class="btn btn-outline-dark rounded-pill px-4">
                Student Register
            </a>
        </div>
    </div>
</div>

{% endblock %}
