{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center py-4" style="min-height: 85vh;">
    <div class="unibuzz-card p-0 shadow-lg border-0 overflow-hidden w-100" style="max-width: 900px; border-radius: 20px;">
        <div class="row g-0" style="min-height: 500px;">
            
            <!-- Left Brand Side -->
            <div class="col-lg-5 d-none d-lg-flex flex-column justify-content-center position-relative text-white p-5" style="background: url('https://images.unsplash.com/photo-1434030216411-0b793f4b4173?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') center/cover;">
                <div class="position-absolute top-0 start-0 w-100 h-100" style="background: linear-gradient(135deg, rgba(178, 143, 111, 0.9), rgba(212, 187, 165, 0.8));"></div>
                <div class="position-relative z-1 text-center">
                    <i class="fa-solid fa-user-graduate mb-3" style="font-size: 3.5rem;"></i>
                    <h2 class="fw-bold mb-3" style="letter-spacing: -0.5px;">Student Portal</h2>
                    <p class="opacity-75 mb-0">Access your feed, connect with peers, and stay updated.</p>
                </div>
            </div>
            
            <!-- Right Form Side -->
            <div class="col-lg-7 d-flex flex-column justify-content-center align-items-center bg-white p-4 p-md-5">
                <div style="max-width: 380px; width: 100%;">
                    
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-dark mb-1">Sign In</h3>
                        <p class="text-muted">Enter your details to continue</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-muted mb-1">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted px-3" style="border-radius: 12px 0 0 12px;">
                                    <i class="fa-regular fa-user"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0 shadow-none py-2" style="border-radius: 0 12px 12px 0;" placeholder="Enter your username" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-muted mb-1">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted px-3" style="border-radius: 12px 0 0 12px;">
                                    <i class="fa-solid fa-lock"></i>
                                </span>
                                <input type="password" name="password" class="form-control border-start-0 shadow-none py-2" style="border-radius: 0 12px 12px 0;" placeholder="Enter your password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-unibuzz-primary w-100 rounded-pill py-2 fw-bold fs-6 mb-4">
                            Log In
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="text-muted small">Don't have an account? <a href="{% url 'register' %}" class="fw-bold text-decoration-none">Register here</a></p>
                    </div>

                </div>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
