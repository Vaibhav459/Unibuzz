{% extends 'base.html' %}

{% block content %}
<div class="mx-auto" style="max-width: 600px;">
    <div class="unibuzz-card p-4">
        <h4 class="fw-bold mb-4">Create a Study Group or Club</h4>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label fw-bold">Group Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Computer Science 101" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Description</label>
                <textarea name="description" class="form-control" rows="4" placeholder="What is this group about?" required></textarea>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-unibuzz-primary py-2 rounded-pill fw-bold">Create Group</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
