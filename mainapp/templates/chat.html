{% extends 'base.html' %}

{% block content %}
<div class="mx-auto d-flex flex-column" style="max-width: 600px; height: 75vh;">
    
    <!-- Chat Header -->
    <div class="unibuzz-card p-3 mb-3 d-flex align-items-center sticky-top">
        <a href="{% url 'inbox' %}" class="btn btn-sm btn-light me-3 rounded-circle">←</a>
        <img src="{{ other_user.profile.profile_image.url }}" class="rounded-circle me-3" width="40" height="40" style="object-fit: cover;">
        <h5 class="fw-bold mb-0"><a href="{% url 'profile' other_user.username %}" class="text-decoration-none" style="color: var(--text-main);">{{ other_user.username }}</a></h5>
    </div>

    <!-- Messages Area -->
    <div class="flex-grow-1 overflow-auto unibuzz-card p-3 mb-3 d-flex flex-column gap-3" id="chat-box" style="background-color: var(--bg-color);">
        {% for message in messages_list %}
            <div class="d-flex {% if message.sender == request.user %}justify-content-end{% else %}justify-content-start{% endif %}">
                <div class="px-4 py-2 rounded-4 {% if message.sender == request.user %}text-white{% else %}bg-white border text-dark{% endif %}" 
                     style="max-width: 75%; {% if message.sender == request.user %}background: linear-gradient(135deg, var(--accent-primary), #ff8787);{% endif %}">
                    {{ message.content }}
                    <div style="font-size: 0.65rem; opacity: 0.8; text-align: {% if message.sender == request.user %}right{% else %}left{% endif %}; margin-top: 4px;">
                        {{ message.timestamp|date:"h:i A" }}
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="text-center text-muted my-auto">
                <p>No messages yet. Say hi! 👋</p>
            </div>
        {% endfor %}
    </div>

    <!-- Input Area -->
    <form method="POST" class="d-flex gap-2">
        {% csrf_token %}
        <input type="text" name="content" class="form-control rounded-pill px-4 py-2" placeholder="Type a message..." required autocomplete="off" autofocus>
        <button type="submit" class="btn btn-unibuzz-primary rounded-pill px-4">Send</button>
    </form>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    chatBox.scrollTop = chatBox.scrollHeight;
</script>
{% endblock %}
