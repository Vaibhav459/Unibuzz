{% extends 'base.html' %}

{% block content %}

<div class="mx-auto" style="max-width: 700px;">

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">

            <h2 class="fw-bold text-center mb-4">Edit Post</h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Post Content</label>
                    <textarea name="content" class="form-control" rows="5" placeholder="Write something...">{{ post.content }}</textarea>
                </div>

                {% if post.image %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Current Image</label>
                    <div>
                        <img src="{{ post.image.url }}" alt="Current Post Image" class="img-fluid rounded-4" style="max-height: 350px; object-fit: cover;">
                    </div>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="remove_image" value="yes" id="removeImage">
                    <label class="form-check-label" for="removeImage">
                        Remove current image
                    </label>
                </div>
                {% endif %}

                <div class="mb-4">
                    <label class="form-label fw-semibold">Upload New Image</label>
                    <input type="file" name="image" class="form-control" accept="image/*">
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill px-4">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-dark rounded-pill px-4">
                        Save Changes
                    </button>
                </div>
            </form>

        </div>
    </div>

</div>

{% endblock %}
